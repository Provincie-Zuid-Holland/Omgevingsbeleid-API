api:
  routers:
    - prefix: /users
      endpoints:
        - resolver: create_user
          resolver_data:
            allowed_roles:
              - "Behandelend Ambtenaar"
              - "Portefeuillehouder"
              - "Beheerder"
    - prefix: /users/{user_uuid}
      endpoints:
        - resolver: get_user
        - resolver: edit_user
          resolver_data:
            allowed_roles:
              - "Behandelend Ambtenaar"
              - "Portefeuillehouder"
              - "Beheerder"
    - prefix: /modules/{module_id}
      endpoints:
        - resolver: activate_module
          resolver_data:
            path: /activate
    - prefix: /objects/valid
      endpoints:
        - resolver: list_all_latest_objects
          resolver_data:
            allowed_object_types:
              - beleidsdoel
              - beleidskeuze
              - maatregel
            sort:
              default:
                column: Object_ID
                order: asc
              allowed_columns:
                - Object_ID
                - Title
                - Modified_Date
            model_map:
              beleidsdoel: beleidsdoel_basic
              beleidskeuze: beleidskeuze_basic
              maatregel: maatregel_basic
            response_model_name: PagedListAllLatestObjectsResponse

columns:
  title:
