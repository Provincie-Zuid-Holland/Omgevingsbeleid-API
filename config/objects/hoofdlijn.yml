id: hoofdlijn
object_type: hoofdlijn

sort_allowed_columns: &sort_allowed_columns
  - Object_ID
  - Title
  - Modified_Date

sort_default_title: &sort_default_title
  default:
    column: Title
    order: asc
  allowed_columns: *sort_allowed_columns

sort_default_modified_date: &sort_default_modified_date
  default:
    column: Modified_Date
    order: desc
  allowed_columns: *sort_allowed_columns

api:
  routers:
    - prefix: /hoofdlijnen
      endpoints:
        - resolver: valid_list_lineages
          resolver_data:
            path: /valid
            response_model: hoofdlijn_basic
            allowed_filter_columns:
              - Title
            sort: *sort_default_title
        - resolver: valid_list_lineage_tree
          resolver_data:
            path: /valid/{lineage_id}
            response_model: hoofdlijn_basic
            allowed_filter_columns:
              - Title
            sort: *sort_default_modified_date
        - resolver: object_version
          resolver_data:
            path: /version/{object_uuid}
            response_model: hoofdlijn_full
        - resolver: object_latest
          resolver_data:
            path: /latest/{lineage_id}
            response_model: hoofdlijn_full
    - prefix: /hoofdlijn/static/{lineage_id}
      endpoints:
        - resolver: edit_object_static
          resolver_data:
            request_model: hoofdlijn_static_post
            result_model: hoofdlijn_static_post_validated
    - prefix: /modules/{module_id}/object/hoofdlijn
      endpoints:
        - resolver: module_patch_object
          resolver_data:
            path: /{lineage_id}
            request_model: hoofdlijn_patch
            response_model: hoofdlijn_uuid
        - resolver: module_list_lineage_tree
          resolver_data:
            path: /{lineage_id}
            response_model: hoofdlijn_extended
            allowed_filter_columns:
              - Title
            sort: *sort_default_modified_date
        - resolver: module_object_latest
          resolver_data:
            path: /latest/{lineage_id}
            response_model: hoofdlijn_full
        - resolver: module_object_version
          resolver_data:
            path: /version/{object_uuid}
            response_model: hoofdlijn_full
    - prefix: /modules/object/hoofdlijn
      endpoints:
        - resolver: list_active_module_objects
          resolver_data:
            path: /active/{lineage_id}
    - prefix: /revisions/{module_id}/hoofdlijn/version/{object_uuid}
      endpoints:
        - resolver: module_object_version
          resolver_data:
            response_model: hoofdlijn_full
            minimum_status: 'Ontwerp GS Concept'
            require_auth: False

fields:
  title:
    name: Title
    type: str
    column: title
    validators:
      - id: none_to_default_value
  hoofdlijn_type:
    name: Hoofdlijn_Type
    type: str
    column: hoofdlijn_type
    validators:
      - id: none_to_default_value

  # Statics
  owner_1_uuid:
    name: Owner_1_UUID
    type: uuid
    column: owner_1_uuid
    optional: true
  owner_2_uuid:
    name: Owner_2_UUID
    type: uuid
    column: owner_2_uuid
    optional: true

models:
  hoofdlijn_minimal:
    name: HoofdlijnMinimal
    fields:
      object_type:
      object_id:
      uuid:
      title:
  hoofdlijn_basic:
    name: HoofdlijnBasic
    fields:
      object_id:
      code:
      uuid:
      adjust_on:
      created_date:
      modified_date:
      title:
      hoofdlijn_type:
      start_validity:
      end_validity:
    services:
      next_object_version:
        to_field: Next_Version
  hoofdlijn_extended:
    name: HoofdlijnExtended
    fields:
      object_id:
      code:
      uuid:
      adjust_on:
      created_date:
      modified_date:
      title:
      hoofdlijn_type:
      start_validity:
      end_validity:
    dependency_model_ids:
      - user_short
    services:
      foreign_keys_extender:
        fields_map:
          - to_field: Created_By
            model_id: user_short
          - to_field: Modified_By
            model_id: user_short
      static_foreign_keys_extender:
        fields_map:
          - to_field: Owner_1
            model_id: user_short
          - to_field: Owner_2
            model_id: user_short
  hoofdlijn_full:
    name: HoofdlijnFull
    fields:
      object_id:
      code:
      uuid:
      adjust_on:
      created_date:
      modified_date:
      title:
      hoofdlijn_type:
      start_validity:
      end_validity:
    dependency_model_ids:
      - user_short
      - hierarchy_statics
    services:
      next_object_version:
        to_field: Next_Version
      public_revisions:
        to_field: Public_Revisions
      foreign_keys_extender:
        fields_map:
          - to_field: Created_By
            model_id: user_short
          - to_field: Modified_By
            model_id: user_short
      static_foreign_keys_extender:
        fields_map:
          - to_field: Owner_1
            model_id: user_short
          - to_field: Owner_2
            model_id: user_short
  hoofdlijn_patch:
    name: HoofdlijnPatch
    fields:
      title:
        default: none
        optional: true
        validators:
          - id: length
            data:
              min: 3
              max: 200
          - id: plain_text
      hoofdlijn_type:
        default: none
        optional: true
        validators:
          - id: length
            data:
              min: 3
              max: 200
          - id: plain_text
  hoofdlijn_static_post:
    name: HoofdlijnStaticPost
    static_only: true
    fields:
      owner_1_uuid:
      owner_2_uuid:
  hoofdlijn_static_post_validated:
    name: HoofdlijnStaticPostValidated
    static_only: true
    model_validators:
      - id: not_equal_root
        data:
          fields:
            - Owner_1_UUID
            - Owner_2_UUID
          allow_none: True
          error_message: Owners should vary
    fields:
      owner_1_uuid:
      owner_2_uuid:
  hoofdlijn_uuid:
    name: HoofdlijnUUID
    fields:
      object_id:
      uuid:
  hoofdlijn_module_validate:
    name: HoofdlijnModuleValidate
    fields:
      title:
        validators:
          - id: length
            data:
              min: 3
              max: 200
          - id: plain_text
      hoofdlijn_type:
          - id: length
            data:
              min: 3
              max: 200
          - id: plain_text
